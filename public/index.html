<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>КТО — Админка</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh; }

    .topbar { background: #1e293b; border-bottom: 1px solid rgba(255,255,255,0.06);
              padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; }
    .topbar-title { font-size: 16px; font-weight: 600; color: #f1f5f9; }
    .topbar-sub { font-size: 11px; color: #64748b; margin-top: 2px; }

    .container { max-width: 1000px; margin: 0 auto; padding: 28px 20px; }

    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: #1e293b; border-radius: 12px; padding: 16px 18px;
                 border: 1px solid rgba(255,255,255,0.06); }
    .stat-num { font-size: 26px; font-weight: 600; color: #f1f5f9; }
    .stat-label { font-size: 11px; color: #64748b; margin-top: 4px; }

    .section { background: #1e293b; border-radius: 14px; border: 1px solid rgba(255,255,255,0.06); overflow: hidden; }
    .section-header { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.06);
                      display: flex; align-items: center; justify-content: space-between; }
    .section-title { font-size: 14px; font-weight: 500; color: #f1f5f9; }

    .tabs { display: flex; gap: 0; margin-bottom: 20px; background: #1e293b;
            border-radius: 10px; padding: 4px; border: 1px solid rgba(255,255,255,0.06); width: fit-content; }
    .tab { padding: 7px 18px; border-radius: 7px; font-size: 12px; cursor: pointer;
           color: #64748b; border: none; background: transparent; transition: all 0.15s; }
    .tab.active { background: #334155; color: #f1f5f9; }

    table { width: 100%; border-collapse: collapse; }
    th { font-size: 10px; color: #64748b; text-align: left; padding: 10px 20px;
         text-transform: uppercase; letter-spacing: 0.5px;
         border-bottom: 1px solid rgba(255,255,255,0.06); }
    td { font-size: 12px; color: #cbd5e1; padding: 12px 20px;
         border-bottom: 1px solid rgba(255,255,255,0.04); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge { display: inline-block; font-size: 10px; padding: 2px 8px;
             border-radius: 20px; font-weight: 500; }
    .badge-active { background: rgba(74,222,128,0.12); color: #4ade80; }
    .badge-inactive { background: rgba(248,113,113,0.12); color: #f87171; }
    .badge-free { background: rgba(96,165,250,0.12); color: #60a5fa; }
    .badge-taken { background: rgba(251,191,36,0.12); color: #fbbf24; }
    .badge-done { background: rgba(148,163,184,0.12); color: #94a3b8; }

    .btn { padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 500;
           cursor: pointer; border: none; transition: all 0.15s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-danger { background: rgba(248,113,113,0.15); color: #f87171;
                  border: 1px solid rgba(248,113,113,0.2); }
    .btn-danger:hover { background: rgba(248,113,113,0.25); }
    .btn-success { background: rgba(74,222,128,0.15); color: #4ade80;
                   border: 1px solid rgba(74,222,128,0.2); }
    .btn-success:hover { background: rgba(74,222,128,0.25); }
    .btn-sm { padding: 4px 10px; font-size: 10px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
                     align-items: center; justify-content: center; z-index: 100; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1e293b; border-radius: 14px; padding: 24px; width: 360px;
             border: 1px solid rgba(255,255,255,0.1); }
    .modal-title { font-size: 15px; font-weight: 500; margin-bottom: 18px; color: #f1f5f9; }
    .field { margin-bottom: 14px; }
    .field label { font-size: 11px; color: #94a3b8; display: block; margin-bottom: 5px; }
    .field input { width: 100%; background: #0f172a; border: 1px solid rgba(255,255,255,0.1);
                   border-radius: 8px; padding: 9px 12px; font-size: 12px; color: #e2e8f0;
                   outline: none; transition: border-color 0.15s; }
    .field input:focus { border-color: #3b82f6; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

    .toast { position: fixed; bottom: 24px; right: 24px; background: #334155;
             color: #f1f5f9; padding: 12px 18px; border-radius: 10px; font-size: 12px;
             display: none; border: 1px solid rgba(255,255,255,0.08); z-index: 200; }
    .toast.show { display: block; animation: slideIn 0.2s ease; }
    @keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty { text-align: center; padding: 40px; color: #475569; font-size: 13px; }

    @media (max-width: 600px) {
      .stats { grid-template-columns: repeat(2, 1fr); }
      .container { padding: 16px 12px; }
    }
  </style>
</head>
<body>

<!-- Шапка -->
<div class="topbar">
  <div>
    <div class="topbar-title">КТО — Панель администратора</div>
    <div class="topbar-sub">Управление мастерами и заявками</div>
  </div>
  <button class="btn btn-primary" onclick="openAddModal()">+ Добавить мастера</button>
</div>

<div class="container">

  <!-- Статистика -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="stat-masters">—</div>
      <div class="stat-label">Мастеров активно</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-total">—</div>
      <div class="stat-label">Заявок всего</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-free">—</div>
      <div class="stat-label">Свободных заявок</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-done" style="color:#4ade80">—</div>
      <div class="stat-label">Выполнено</div>
    </div>
  </div>

  <!-- Вкладки -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('masters', this)">Мастера</button>
    <button class="tab" onclick="showTab('requests', this)">Заявки</button>
  </div>

  <!-- Таблица мастеров -->
  <div id="tab-masters" class="section">
    <div class="section-header">
      <div class="section-title">Список мастеров</div>
      <button class="btn btn-primary btn-sm" onclick="loadMasters()">Обновить</button>
    </div>
    <table>
      <thead><tr>
        <th>Мастер</th><th>Телефон</th><th>Код</th><th>Статус</th><th>Действия</th>
      </tr></thead>
      <tbody id="masters-tbody">
        <tr><td colspan="5" class="empty">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Таблица заявок -->
  <div id="tab-requests" class="section" style="display:none">
    <div class="section-header">
      <div class="section-title">Все заявки</div>
      <button class="btn btn-primary btn-sm" onclick="loadRequests()">Обновить</button>
    </div>
    <table>
      <thead><tr>
        <th>Номер</th><th>Категория</th><th>Адрес</th>
        <th>Срок</th><th>Мастер</th><th>Статус</th>
      </tr></thead>
      <tbody id="requests-tbody">
        <tr><td colspan="6" class="empty">Загрузка...</td></tr>
      </tbody>
    </table>
  </div>

</div> <!-- /container -->

<!-- Модальное окно: добавить мастера -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title">Добавить мастера</div>
    <div class="field">
      <label>ФИО *</label>
      <input type="text" id="inp-name" placeholder="Иванов Алексей Петрович">
    </div>
    <div class="field">
      <label>Телефон</label>
      <input type="text" id="inp-phone" placeholder="+7 913 111-22-33">
    </div>
    <div class="field">
      <label>Код (из 1С)</label>
      <input type="text" id="inp-code" placeholder="019254">
    </div>
    <div class="modal-actions">
      <button class="btn" style="background:#334155;color:#cbd5e1" onclick="closeModal()">Отмена</button>
      <button class="btn btn-primary" onclick="addMaster()">Добавить</button>
    </div>
  </div>
</div>

<!-- Всплывающие уведомления -->
<div class="toast" id="toast"></div>
<script>
const API = 'https://kto-server-production.up.railway.app/api';

// ── Утилиты ──────────────────────────────
function toast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderLeft = `3px solid ${ok ? '#4ade80' : '#f87171'}`;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ru-RU');
}

function statusBadge(s) {
  const map = {
    free:  ['badge-free',  'Свободна'],
    taken: ['badge-taken', 'В работе'],
    done:  ['badge-done',  'Выполнено']
  };
  const [cls, label] = map[s] || ['badge-done', s];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── Вкладки ───────────────────────────────
function showTab(name, btn) {
  document.getElementById('tab-masters').style.display = name === 'masters' ? '' : 'none';
  document.getElementById('tab-requests').style.display = name === 'requests' ? '' : 'none';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  if (name === 'requests') loadRequests();
}

// ── Загрузка мастеров ─────────────────────
async function loadMasters() {
  const res = await fetch(`${API}/masters/all`);
  const data = await res.json();
  const tbody = document.getElementById('masters-tbody');

  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty">Мастера не найдены</td></tr>';
    return;
  }

  document.getElementById('stat-masters').textContent = data.filter(m => m.is_active).length;

  tbody.innerHTML = data.map(m => `
    <tr>
      <td><b style="color:#f1f5f9">${m.full_name}</b></td>
      <td>${m.phone || '—'}</td>
      <td>${m.code || '—'}</td>
      <td><span class="badge ${m.is_active ? 'badge-active' : 'badge-inactive'}">
        ${m.is_active ? 'Активен' : 'Отключён'}</span></td>
      <td>
        ${m.is_active
          ? `<button class="btn btn-danger btn-sm" onclick="toggleMaster(${m.id}, 0, '${m.full_name}', '${m.phone||''}', event)">Отключить</button>`
          : `<button class="btn btn-success btn-sm" onclick="toggleMaster(${m.id}, 1, '${m.full_name}', '${m.phone||''}', event)">Включить</button>`
        }
      </td>
    </tr>
  `).join('');
}

// ── Активация/деактивация мастера ─────────
async function toggleMaster(id, active, name, phone, e) {
  e.target.disabled = true;
  await fetch(`${API}/masters/${id}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ full_name: name, phone, is_active: active })
  });
  toast(active ? `${name} активирован` : `${name} отключён`);
  loadMasters();
}

// ── Модальное окно ────────────────────────
function openAddModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('inp-name').focus();
}
function closeModal(e) {
  if (!e || e.target.id === 'modal') {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('inp-name').value = '';
    document.getElementById('inp-phone').value = '';
    document.getElementById('inp-code').value = '';
  }
}

async function addMaster() {
  const full_name = document.getElementById('inp-name').value.trim();
  const phone = document.getElementById('inp-phone').value.trim();
  const code = document.getElementById('inp-code').value.trim();
  if (!full_name) { toast('Введите ФИО!', false); return; }

  const res = await fetch(`${API}/masters`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ full_name, phone, code })
  });
  if (res.ok) {
    toast(`${full_name} добавлен!`);
    closeModal();
    loadMasters();
  } else {
    toast('Ошибка при добавлении', false);
  }
}

// ── Загрузка заявок ───────────────────────
async function loadRequests() {
  const res = await fetch(`${API}/requests`);
  const data = await res.json();
  const tbody = document.getElementById('requests-tbody');

  document.getElementById('stat-total').textContent = data.length;
  document.getElementById('stat-free').textContent = data.filter(r => r.status === 'free').length;
  document.getElementById('stat-done').textContent = data.filter(r => r.status === 'done').length;

  if (!data.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Заявок нет</td></tr>';
    return;
  }
  tbody.innerHTML = data.map(r => `
    <tr>
      <td><b style="color:#60a5fa">#${r.number_1c}</b></td>
      <td>${r.category || '—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.address || '—'}</td>
      <td>${fmtDate(r.deadline)}</td>
      <td>${r.master_name || '<span style="color:#475569">не назначен</span>'}</td>
      <td>${statusBadge(r.status)}</td>
    </tr>
  `).join('');
}

// ── Старт ─────────────────────────────────
loadMasters();
</script>
</body></html>
